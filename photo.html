<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS Officer Photo View</title>
  <link rel="stylesheet" href="style_dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header id="page-header">AIS Officer Photo View</header>

<div class="nav-bar">
  <div class="nav-bar-inner" id="nav-inner"></div>
</div>

<!-- Retirement Date Dual-Range Slider -->
<div id="photo-retire-bar" class="retire-filter-bar" style="display:none;">
  <div class="retire-slider-row">
    <span class="retire-slider-label">&#128197; Retirement Date</span>
    <span class="retire-year-pill" id="photo-ret-min-lbl">—</span>
    <div class="dual-range-outer">
      <div class="dual-range-track">
        <div class="dual-range-fill" id="photo-ret-track-fill"></div>
      </div>
      <input type="range" id="photo-ret-min" oninput="photoRetireSlider('min')">
      <input type="range" id="photo-ret-max" oninput="photoRetireSlider('max')">
    </div>
    <span class="retire-year-pill" id="photo-ret-max-lbl">—</span>
    <button class="retire-reset-btn" onclick="photoRetireReset()">&#8635; All</button>
  </div>
</div>

<div class="photo-wrapper">
  <div id="photoGrid" class="photo-grid"></div>
</div>

<!-- Officer detail popup -->
<div id="photo-popup" class="photo-popup-overlay">
  <div class="photo-popup-box">
    <span class="photo-popup-close" onclick="document.getElementById('photo-popup').classList.remove('open')">&#10006;</span>
    <div id="photo-popup-details"></div>
  </div>
</div>

<!-- Build nav immediately -->
<script>
(function () {
  var svc = (new URLSearchParams(location.search).get('service') || 'IAS').toUpperCase();
  var labels = {
    IAS: 'IAS Officer Photo View',
    IPS: 'IPS Officer Photo View',
    IFS: 'IFS Officer Photo View'
  };
  document.getElementById('page-header').textContent = labels[svc] || labels.IAS;
  document.title = labels[svc] || labels.IAS;

  document.getElementById('nav-inner').innerHTML =
    '<button onclick="location.href=\'table.html?service=' + svc + '\'" class="animated-button black">' +
      '<i data-lucide="table"></i>Tabular View</button>' +
    '<button onclick="location.href=\'graph.html?service=' + svc + '\'" class="animated-button blue">' +
      '<i data-lucide="bar-chart-3"></i>Graphical View</button>' +
    '<button onclick="location.href=\'table.html?service=IAS\'" class="animated-button mustard">' +
      '<i data-lucide="circle-user-round"></i>IAS Data</button>' +
    '<button onclick="location.href=\'table.html?service=IPS\'" class="animated-button red">' +
      '<i data-lucide="shield-user"></i>IPS Data</button>' +
    '<button onclick="location.href=\'table.html?service=IFS\'" class="animated-button green">' +
      '<i data-lucide="tree-deciduous"></i>IFS Data</button>' +
    '<button id="hcmFilterBtn" class="animated-button purple">' +
      '<i data-lucide="user-check"></i>Select Chief Minister</button>' +
    '<button id="adminNavBtn" onclick="location.href=\'admin.html\'" class="animated-button teal" style="display:none">' +
      '<i data-lucide="settings"></i>Admin</button>' +
    '<button onclick="signOut()" class="animated-button darkred">' +
      '<i data-lucide="log-out"></i>Logout</button>' +
    '<button id="fsBtn" onclick="toggleFullscreen()" class="animated-button yellow">' +
      '<i data-lucide="maximize"></i>Fullscreen</button>';
})();
isAdmin().then(function(admin) {
  if (admin) {
    var btn = document.getElementById('adminNavBtn');
    if (btn) { btn.style.display = ''; if (typeof lucide !== 'undefined') lucide.createIcons(); }
  }
});
</script>

<!-- Fullscreen -->
<script>
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function () {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', function () {
  var btn = document.getElementById('fsBtn');
  if (!btn) return;
  btn.innerHTML = document.fullscreenElement
    ? '<i data-lucide="minimize"></i>Exit Full'
    : '<i data-lucide="maximize"></i>Fullscreen';
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
document.addEventListener('DOMContentLoaded', function () {
  document.documentElement.requestFullscreen().catch(function () {});
});
</script>

<!-- HCM Selector Modal -->
<div id="hcmModal" class="hcm-modal-overlay">
  <div class="hcm-modal-box">
    <div class="hcm-modal-header">
      <span>&#128081; Select Chief Minister</span>
      <span class="hcm-modal-close" onclick="document.getElementById('hcmModal').classList.remove('open')">&#10006;</span>
    </div>
    <div class="hcm-modal-actions">
      <button id="hcmSelectAll">Select All</button>
      <button id="hcmDeselectAll">Deselect All</button>
    </div>
    <div id="hcmCardGrid" class="hcm-card-grid"></div>
  </div>
</div>

<script src="script_photo.js"></script>
</body>
</html>
