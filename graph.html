<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS Officer Service Graphical Report</title>
  <link rel="stylesheet" href="style_dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="responsive_fit.css">
</head>
<body>

<header id="page-header">AIS Officer Service Graphical Report</header>

<div class="nav-bar" id="nav-bar">
  <div class="nav-bar-inner" id="nav-inner"></div>
  <button id="nav-toggle-btn" onclick="toggleNav()" title="Collapse / Expand navigation">
    <i data-lucide="chevron-up"></i><span id="nav-toggle-label">Hide</span>
  </button>
</div>

<div class="graph-wrapper">
  <div id="legend" class="legend-container"></div>
  <div id="chartGrid" class="chart-grid"></div>
</div>

<!-- Popup A: Officer Details -->
<div id="officer-popupa" class="popupa">
  <span class="popupa-close" onclick="$('#officer-popupa').hide()">&#10006;</span>
  <div id="officer-details"></div>
</div>

<!-- Set header/title and build nav immediately -->
<script>
(function () {
  var svc = (new URLSearchParams(location.search).get('service') || 'IAS').toUpperCase();
  var labels = {
    IAS: 'IAS Officer Service Graphical Report',
    IPS: 'IPS Officer Service Graphical Report',
    IFS: 'IFS Officer Service Graphical Report'
  };
  var label = labels[svc] || labels.IAS;
  document.getElementById('page-header').textContent = label;
  document.title = label;

  document.getElementById('nav-inner').innerHTML =
    '<div class="nav-sections">' +
    '<div class="nav-section">' +
      '<div class="nav-section-label">Officer Type</div>' +
      '<div class="nav-section-buttons">' +
        '<button onclick="location.href=\'table.html?service=IAS\'" class="animated-button mustard' + (svc === 'IAS' ? ' nav-active' : '') + '">' +
          '<i data-lucide="circle-user-round"></i>IAS</button>' +
        '<button onclick="location.href=\'table.html?service=IPS\'" class="animated-button red' + (svc === 'IPS' ? ' nav-active' : '') + '">' +
          '<i data-lucide="shield-user"></i>IPS</button>' +
        '<button onclick="location.href=\'table.html?service=IFS\'" class="animated-button green' + (svc === 'IFS' ? ' nav-active' : '') + '">' +
          '<i data-lucide="tree-deciduous"></i>IFS</button>' +
      '</div>' +
    '</div>' +
    '<div class="nav-section">' +
      '<div class="nav-section-label">View Type</div>' +
      '<div class="nav-section-buttons">' +
        '<button onclick="location.href=\'table.html?service=' + svc + '\'" class="animated-button black">' +
          '<i data-lucide="table"></i>Tabular</button>' +
        '<button class="animated-button blue nav-active"><i data-lucide="bar-chart-3"></i>Graphical</button>' +
        '<button onclick="location.href=\'photo.html?service=' + svc + '\'" class="animated-button pink">' +
          '<i data-lucide="image"></i>Photo</button>' +
        '<button onclick="location.href=\'360.html?service=' + svc + '\'" class="animated-button orange">' +
          '<i data-lucide="rotate-3d"></i>360°</button>' +
      '</div>' +
    '</div>' +
    '<div class="nav-section">' +
      '<div class="nav-section-label">Others</div>' +
      '<div class="nav-section-buttons">' +
        '<button onclick="location.href=\'landing.html\'" class="animated-button blue">' +
          '<i data-lucide="house"></i>Home</button>' +
        '<button id="hcmFilterBtn" class="animated-button purple">' +
          '<i data-lucide="user-check"></i>Chief Minister</button>' +
        '<button id="adminNavBtn" onclick="location.href=\'admin.html\'" class="animated-button teal" style="display:none">' +
          '<i data-lucide="settings"></i>Admin</button>' +
        '<button id="fsBtn" onclick="toggleFullscreen()" class="animated-button yellow">' +
          '<i data-lucide="maximize"></i>Full Screen</button>' +
        '<button onclick="signOut()" class="animated-button darkred">' +
          '<i data-lucide="log-out"></i>Logout</button>' +
      '</div>' +
    '</div>' +
    '</div>';

  // Patch nav buttons: replace location.href with navTo() to preserve fullscreen
  document.querySelectorAll('#nav-inner button[onclick]').forEach(function (btn) {
    if (btn.id === 'adminNavBtn') return;
    var oc = btn.getAttribute('onclick') || '';
    var m  = oc.match(/location\.href=['"]([^'"]+)['"]/);
    if (m) btn.setAttribute('onclick', 'navTo("' + m[1] + '")');
  });
})();
isAdmin().then(function(admin) {
  if (admin) {
    var btn = document.getElementById('adminNavBtn');
    if (btn) { btn.style.display = ''; if (typeof lucide !== 'undefined') lucide.createIcons(); }
  }
});
</script>

<script>
// ---- Nav collapse/expand ----
function toggleNav() {
  var bar   = document.getElementById('nav-bar');
  var label = document.getElementById('nav-toggle-label');
  var collapsed = bar.classList.toggle('nav-collapsed');
  if (label) label.textContent = collapsed ? 'Show' : 'Hide';
  try { sessionStorage.setItem('ais_nav_collapsed', collapsed ? '1' : '0'); } catch(e) {}
  if (typeof lucide !== 'undefined') lucide.createIcons();
}
(function () {
  try {
    if (sessionStorage.getItem('ais_nav_collapsed') === '1') {
      var bar   = document.getElementById('nav-bar');
      var label = document.getElementById('nav-toggle-label');
      if (bar)   bar.classList.add('nav-collapsed');
      if (label) label.textContent = 'Show';
    }
  } catch(e) {}
})();

// ---- Fullscreen helpers ----
function navTo(url) {
  try { sessionStorage.setItem('ais_fs_mode', '1'); } catch(e) {}
  function go() { location.href = url; }
  if (document.fullscreenElement) { go(); return; }
  var el = document.documentElement;
  var req = el.requestFullscreen || el.webkitRequestFullscreen;
  if (req) { Promise.resolve(req.call(el)).then(go).catch(go); } else { go(); }
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    try { sessionStorage.setItem('ais_fs_mode', '1'); } catch(e) {}
    document.documentElement.requestFullscreen().catch(function () {});
  } else {
    try { sessionStorage.removeItem('ais_fs_mode'); } catch(e) {}
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange', function () {
  var btn = document.getElementById('fsBtn');
  if (!btn) return;
  if (document.fullscreenElement) {
    btn.innerHTML = '<i data-lucide="minimize"></i>Exit Full';
  } else {
    try { sessionStorage.removeItem('ais_fs_mode'); } catch(e) {}
    btn.innerHTML = '<i data-lucide="maximize"></i>Fullscreen';
  }
  if (typeof lucide !== 'undefined') lucide.createIcons();
});

document.addEventListener('DOMContentLoaded', function () {
  var btn = document.getElementById('fsBtn');
  var wantFs = false;
  try { wantFs = !!sessionStorage.getItem('ais_fs_mode'); } catch(e) {}
  if (document.fullscreenElement) {
    if (btn) { btn.innerHTML = '<i data-lucide="minimize"></i>Exit Full'; if (typeof lucide !== 'undefined') lucide.createIcons(); }
  } else if (wantFs) {
    document.documentElement.requestFullscreen().catch(function () {});
  }
});
</script>

<!-- HCM Selector Modal -->
<div id="hcmModal" class="hcm-modal-overlay">
  <div class="hcm-modal-box">
    <div class="hcm-modal-header">
      <span>&#128081; Select Chief Minister</span>
      <span class="hcm-modal-close" onclick="document.getElementById('hcmModal').classList.remove('open')">&#10006;</span>
    </div>
    <div class="hcm-modal-actions">
      <button id="hcmSelectAll">Select All</button>
      <button id="hcmDeselectAll">Deselect All</button>
    </div>
    <div id="hcmCardGrid" class="hcm-card-grid"></div>
  </div>
</div>

<script src="script_graph.js"></script>
</body>
</html>
