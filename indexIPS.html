<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPS Officer Service Summary</title>
  <link rel="stylesheet" href="style_dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
  window.AIS_CONFIG = {
    serviceType: 'IPS',
    categoryOrder: [
      "TRADITIONAL POLICE AGENCIES",
      "INVESTIGATING AGENCIES",
      "KEY COUNTER AGENCIES",
      "POLICE PERSONNEL MANAGEMENT",
      "ELITE AGENCIES",
      "OTHERS AGENCIES",
      "PERSONAL OFFICES"
    ],
    customDepartmentOrder: {
      "TRADITIONAL POLICE AGENCIES": [
        "LAW AND ORDER", "RAILWAYS", "ROAD SAFETY & TRANSPORT DEPT", "TRAFFIC"
      ],
      "INVESTIGATING AGENCIES": [
        "ANTI CORRUPTION BUREAU", "CRIMES & CRIME INVESTIGATION DEPARTMENT",
        "CYBER CRIMES & TECHNICAL", "VIGILANCE & ENFORCEMENT"
      ],
      "KEY COUNTER AGENCIES": [
        "COASTAL SECURITY", "GREYHOUNDS", "INTELLIGENCE",
        "OCTOPUS & OPERATIONS", "PROHIBITION & EXCISE AND SEB"
      ],
      "POLICE PERSONNEL MANAGEMENT": [
        "ADMINISTRATION WING", "POLICE RECRUITMENT & TRAINING WINGS"
      ],
      "ELITE AGENCIES": [
        "CENTRAL BUREAU OF INVESTIGATION", "INTELLIGENCE BUREAU",
        "NATIONAL INVESTIGATION AGENCY", "UNITED NATIONS ORGANISATION"
      ],
      "OTHERS AGENCIES": [
        "OTHER NON UNIFORM POSTS", "OTHER UNIFORM POSTS",
        "PROBATION & TRAINING", "SPECIAL POLICE", "TTD"
      ],
      "PERSONAL OFFICES": [
        "CHIEF MINISTERS OFFICE", "GOVERNORS OFFICER", "PRIME MINISTERS OFFICE"
      ]
    }
  };
  </script>
  <script src="script_table.js" defer></script>
</head>
<body>

<header>IPS Officer Service Summary Report</header>

<div class="nav-bar">
  <div class="nav-bar-inner">

    <button onclick="location.href='graphIPS.html'" class="animated-button blue">
      <i data-lucide="bar-chart-3"></i>Graphical View
    </button>

    <button onclick="location.href='indexIAS.html'" class="animated-button mustard">
      <i data-lucide="circle-user-round"></i>IAS Data
    </button>

    <button onclick="location.href='indexIPS.html'" class="animated-button red">
      <i data-lucide="shield-user"></i>IPS Data
    </button>

    <button onclick="location.href='indexIFS.html'" class="animated-button green">
      <i data-lucide="tree-deciduous"></i>IFS Data
    </button>

    <div style="position:relative;">
      <button id="hcmFilterBtn" class="animated-button purple">
        <i data-lucide="user-check"></i>Select Chief Minister &#11015;
      </button>
      <div id="hcmDropdown" class="hcm-dropdown"></div>
    </div>

    <button onclick="signOut()" class="animated-button darkred">
      <i data-lucide="log-out"></i>Logout
    </button>

  </div>
</div>

<div class="table-wrapper">
  <table id="officer-table">
    <thead id="table-header"></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- Popup A: Officer Details -->
<div id="officer-popupa" class="popupa">
  <span class="popupa-close" onclick="$('#officer-popupa').hide()">&#10006;</span>
  <div id="officer-details"></div>
</div>

<!-- Popup B: Service Detail -->
<div id="service-popupb" class="popupb">
  <span class="popupb-close" onclick="$('#service-popupb').hide()">&#10006;</span>
  <div id="service-details"></div>
</div>

<!-- Popup C: Full Service History -->
<div id="service-popupc" class="popupc">
  <span class="popupc-close" onclick="$('#service-popupc').hide()">&#10006;</span>
  <div id="service-details-c"></div>
</div>

</body>
</html>
